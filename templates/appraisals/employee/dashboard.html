<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>My Dashboard</title>
  </head>
  <body>
    <h1>Employee Dashboard</h1>
    <p>User: {{ request.user.username }}</p>
    <p>Employee: {{ employee.full_name }} ({{ employee.employee_no }})</p>

    <p>Next: we will list evaluations here.</p>

    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit">Logout</button>
    </form>
  </body>
</html>
